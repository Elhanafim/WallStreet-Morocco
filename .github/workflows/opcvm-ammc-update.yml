name: OPCVM AMMC Weekly Update

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Moroccan time, after market open)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-download even if date already exists'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update-opcvm:
    name: Download & process AMMC weekly XLS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: price_service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r price_service/requirements.txt

      - name: Run AMMC pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -m price_service.opcvm.ammc_pipeline --force
          else
            python -m price_service.opcvm.ammc_pipeline
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/opcvm/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated OPCVM data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opcvm/history.json public/data/opcvm/latest.json
          git commit -m "data(opcvm): weekly AMMC update $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: No new data
        if: steps.changes.outputs.changed != 'true'
        run: echo "No changes detected — OPCVM data is already up to date."
