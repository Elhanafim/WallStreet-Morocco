<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100">
  <!-- BMCE CAPITAL text -->
  <text x="10" y="42" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#1B3A7A" letter-spacing="1">BMCE CAPITAL</text>
  <!-- GROUPE BMCE text -->
  <text x="58" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#8A8A8A" letter-spacing="3">GROUPE BMCE</text>

  <!-- Globe icon (right side) -->
  <!-- Base sphere - light gray/silver -->
  <circle cx="308" cy="50" r="30" fill="url(#sphereGrad)"/>
  <!-- Blue wave/wing through the sphere -->
  <clipPath id="sphereClip">
    <circle cx="308" cy="50" r="30"/>
  </clipPath>
  <ellipse cx="308" cy="56" rx="22" ry="14" fill="url(#blueWave)" clip-path="url(#sphereClip)" transform="rotate(-20, 308, 56)"/>
  <!-- Highlight -->
  <ellipse cx="298" cy="36" rx="10" ry="7" fill="rgba(255,255,255,0.55)" clip-path="url(#sphereClip)"/>

  <defs>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#D8DDE6"/>
      <stop offset="100%" stop-color="#A0AABF"/>
    </radialGradient>
    <linearGradient id="blueWave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A7A"/>
      <stop offset="100%" stop-color="#3A6CC8"/>
    </linearGradient>
  </defs>
</svg>
