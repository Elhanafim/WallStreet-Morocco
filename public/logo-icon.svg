<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="50" fill="#0A2540"/>
  <!-- White diamond -->
  <polygon points="50,8 92,50 50,92 8,50" fill="white"/>
  <!-- Dark blue rounded square inside diamond -->
  <rect x="27" y="27" width="46" height="46" rx="5" fill="#0A2540"/>
  <!-- Arrow line (white) -->
  <line x1="36" y1="64" x2="57" y2="43" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrow head (gold) -->
  <polygon points="52,36 67,44 59,59" fill="#D4AF37"/>
  <!-- 4 gold dots at diamond corners -->
  <circle cx="50" cy="10" r="5.5" fill="#D4AF37"/>
  <circle cx="90" cy="50" r="5.5" fill="#D4AF37"/>
  <circle cx="50" cy="90" r="5.5" fill="#D4AF37"/>
  <circle cx="10" cy="50" r="5.5" fill="#D4AF37"/>
</svg>
